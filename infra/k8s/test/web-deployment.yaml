apiVersion: apps/v1
kind: Deployment
metadata:
  name: kinti-web
  namespace: kinti-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kinti-web
  template:
    metadata:
      labels:
        app: kinti-web
    spec:
      containers:
        - name: web
          image: kinti-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"