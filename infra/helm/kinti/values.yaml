api:
  name: kinti-api
  replicaCount: 1
  image:
    repository: kinti-api
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 3000
  config:
    NODE_ENV: development
    PORT: "3000"
    SUPABASE_URL: ""
    SUPABASE_JWT_ISSUER: ""
    WEB_ORIGIN: ""
  secrets:
    DATABASE_URL: ""
    DIRECT_URL: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    readiness:
      path: /health/db
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 20
  deployment:
    revisionHistoryLimit: 3
    minReadySeconds: 5
    strategy:
      maxSurge: 1
      maxUnavailable: 0

web:
  name: kinti-web
  replicaCount: 1
  image:
    repository: kinti-web
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 80
  config:
    VITE_API_URL: ""
    VITE_SUPABASE_URL: ""
  secrets:
    VITE_SUPABASE_ANON_KEY: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  probes:
    readiness:
      path: /
      initialDelaySeconds: 3
      periodSeconds: 10
    liveness:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20
  deployment:
    revisionHistoryLimit: 3
    minReadySeconds: 5
    strategy:
      maxSurge: 1
      maxUnavailable: 0

ingress:
  name: kinti-ingress
  enabled: true
  className: nginx
  host: kinti.local
  hosts:
    - kinti.local
  tls:
    enabled: false
    secretName: kinti-tls
    clusterIssuer: letsencrypt-prod

imagePullSecrets: []
