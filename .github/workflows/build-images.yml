name: Build container images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: milen-donchev

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/kinti-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/kinti-api:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/Milen-Donchev/kinti
            org.opencontainers.image.description=Kinti API
            org.opencontainers.image.revision=${{ github.sha }}

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/kinti-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/kinti-web:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/Milen-Donchev/kinti
            org.opencontainers.image.description=Kinti Web
            org.opencontainers.image.revision=${{ github.sha }}
